<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flyover Wall Display</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQ3ynhHDuN9n46uO5QZlO2fPFKqD7JU="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <style>
      /* Final wall-display overrides. Keep these after the app stylesheet. */
      @media (min-width: 901px) {
        .ops-display {
          grid-template-columns: minmax(270px, 0.9fr) minmax(360px, 1.25fr) minmax(250px, 0.85fr) !important;
          gap: clamp(20px, 3vw, 48px) !important;
          padding-inline: clamp(24px, 3.5vw, 58px) !important;
        }

        .ops-aircraft-identity {
          grid-template-columns: clamp(58px, 5vw, 82px) minmax(0, 1fr) !important;
          gap: clamp(12px, 1.4vw, 20px) !important;
          min-width: 0 !important;
        }

        .ops-airline-logo,
        .ops-aircraft-mark {
          width: clamp(58px, 5vw, 82px) !important;
          max-width: 82px !important;
        }
      }

      .ops-aircraft-copy,
      .ops-aircraft-type-line {
        min-width: 0 !important;
      }

      /* Aircraft name first, small silhouette underneath. */
      .ops-aircraft-type-line {
        display: flex !important;
        flex-direction: column-reverse !important;
        align-items: flex-start !important;
        gap: 5px !important;
        margin-top: 8px !important;
      }

      .ops-aircraft-type {
        display: block !important;
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        font-size: clamp(21px, 2.25vw, 38px) !important;
        line-height: 1.02 !important;
        white-space: normal !important;
        word-break: normal !important;
        overflow-wrap: normal !important;
        writing-mode: horizontal-tb !important;
      }

      .ops-aircraft-type-icon {
        width: 92px !important;
        height: 48px !important;
        flex: 0 0 auto !important;
        object-fit: contain !important;
        object-position: left center !important;
        margin: 0 !important;
        opacity: 0.9 !important;
      }

      .ops-flight-reference,
      .ops-flight-reference b,
      .ops-flight-reference span {
        white-space: nowrap !important;
        word-break: normal !important;
        overflow-wrap: normal !important;
        writing-mode: horizontal-tb !important;
      }

      @media (max-width: 900px) {
        .ops-aircraft-type {
          font-size: clamp(22px, 7vw, 38px) !important;
        }

        .ops-aircraft-type-icon {
          width: 78px !important;
          height: 40px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
      <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
